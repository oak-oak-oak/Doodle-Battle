services:
  - type: web
    name: doodle-battle
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: CLIENT_ORIGIN
        # Comma-separate dev + prod URLs. Update the prod URL after Vercel deploys.
        value: http://localhost:5173,https://doodle.vercel.app
